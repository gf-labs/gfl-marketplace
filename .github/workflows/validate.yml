name: validate

# A marketplace is only as good as its manifest. This gate parses and validates
# .claude-plugin/marketplace.json on every change so a broken catalog can never
# reach main (and never break `/plugin install` for anyone downstream).

on:
  push:
    paths:
      - ".claude-plugin/marketplace.json"
      - "scripts/validate-marketplace.py"
      - ".github/workflows/validate.yml"
  pull_request:
    paths:
      - ".claude-plugin/marketplace.json"
      - "scripts/validate-marketplace.py"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

# Least privilege: the job only needs to read the checked-out tree.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs; Dependabot keeps them current (.github/dependabot.yml).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Validate marketplace manifest
        run: python3 scripts/validate-marketplace.py
